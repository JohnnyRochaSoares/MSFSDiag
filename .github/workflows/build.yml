name: Build MSFSDiag

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install flet pyinstaller

      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --name MSFSDiag --icon ../assets/MSFSDiag.ico --paths . --hidden-import ui.app --hidden-import core.scanner --hidden-import core.analyzer --hidden-import core.manifest_parser --hidden-import core.json_validator --hidden-import os_services.symlinks --hidden-import os_services.event_logs --hidden-import settings --hidden-import config --add-data "../README.md;." --add-data "../LICENSE;." main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSFSDiag-Windows-EXE
          path: src/dist/MSFSDiag.exe

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/MSFSDiag.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build MSFSDiag

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller flet flet-desktop

      - name: Build
        shell: pwsh
        run: |
          cd src
          pyinstaller --onefile --windowed --name ATC_Advisor `
            --paths . `
            --hidden-import ui.app `
            --hidden-import ui.languages `
            --hidden-import core.logic `
            --hidden-import core.distance `
            --hidden-import core.position `
            --hidden-import core.settings `
            --hidden-import integrations.vatsim `
            --hidden-import integrations.airports `
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSFSDiag-Windows-EXE
          path: src/dist/MSFSDiag.exe

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/MSFSDiag.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build MSFSDiag

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

# Permissão obrigatória para que o GitHub Actions possa criar Releases e enviar o .exe
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instala o requirements se existir, senão avança
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install flet pyinstaller

      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --name MSFSDiag --icon ../assets/MSFSDiag.ico main.py

      # Guarda o executável compilado como um Artefacto no GitHub (útil para testar em commits normais)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSFSDiag-Windows-EXE
          path: src/dist/MSFSDiag.exe

      # Cria a Release oficial no GitHub APENAS quando enviares uma Tag (ex: v1.0)
      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/MSFSDiag.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
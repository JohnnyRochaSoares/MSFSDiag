 name: Build MSFSDiag

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --name MSFSDiag --icon ../assets/MSFSDiag.ico main.py

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/MSFSDiag.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
